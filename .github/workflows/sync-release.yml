name: Sync Release to Gitee

on:
  workflow_dispatch:
    
jobs:
  sync-release-to-gitee:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Sync to Gitee
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --retries 5 --timeout 120 PyGitHub requests
          for attempt in 1 2 3; do
            python3 .github/workflows/sync.py && exit 0
            if [ "$attempt" -lt 3 ]; then
              delay=$((attempt * 60))
              echo "Sync attempt ${attempt} failed, retrying in ${delay}s..."
              sleep "$delay"
            fi
          done
          echo "Sync failed after 3 attempts"
          exit 1
