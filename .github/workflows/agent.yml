name: Build + Release

on:
  push:
    tags:
      - "v*"
    branches:
      - master
    paths-ignore:
      - "README.md"
  pull_request:
    branches:
      - master

permissions:
  actions: write
  contents: write

jobs:
  build-windows:
    strategy:
      fail-fast: true
      matrix:
        include:
          - goarch: amd64
            win7: true
          - goarch: 386
            win7: true
          - goarch: arm64
            win7: false

    name: Build Windows artifacts
    runs-on: ubuntu-latest
    env:
      GOOS: windows
      GOARCH: ${{ matrix.goarch }}
      WIN7_GO_VERSION: "1.26.5"
      WIN7_GO_SDK_SHA256: "aaec2901eb40be5068edce46267c4a287f2ac38cbfd9bbcb76f0320df7168e2d"
      WIN7_GO_LEGACY_SHA256: "1fded9947a2da9e3eb8f6dc1754637dbb4f4eb82d6024c227fae870986cf629c"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up official Go
        if: ${{ matrix.win7 == false }}
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"

      - name: Set up patched Go for Windows 7
        if: ${{ matrix.win7 }}
        run: |
          sdk_archive="$RUNNER_TEMP/go-win7-sdk.zip"
          legacy_archive="$RUNNER_TEMP/go-win7-source-legacy.zip"
          sdk_dir="$RUNNER_TEMP/go-win7"
          legacy_dir="$RUNNER_TEMP/go-win7-source-legacy"
          release_url="https://github.com/XTLS/go-win7/releases/download/patched-$WIN7_GO_VERSION"

          curl --fail --location --silent --show-error \
            "$release_url/go-for-win7-linux-amd64.zip" \
            --output "$sdk_archive"
          curl --fail --location --silent --show-error \
            "$release_url/source-legacy.zip" \
            --output "$legacy_archive"

          echo "$WIN7_GO_SDK_SHA256  $sdk_archive" | sha256sum --check -
          echo "$WIN7_GO_LEGACY_SHA256  $legacy_archive" | sha256sum --check -

          mkdir -p "$sdk_dir" "$legacy_dir"
          unzip -q "$sdk_archive" -d "$sdk_dir"
          unzip -q "$legacy_archive" -d "$legacy_dir"
          cp -R "$legacy_dir/src/." "$sdk_dir/src/"

          echo "$sdk_dir/bin" >> "$GITHUB_PATH"
          "$sdk_dir/bin/go" version

      - name: Verify dependencies
        run: go mod verify

      - name: Build Test
        if: github.event_name != 'push' || !contains(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: build --single-target --clean --snapshot --skip=validate -f .goreleaser-windows.yml

      - name: Build
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: build --single-target --clean --skip=validate -f .goreleaser-windows.yml

      - name: Archive
        run: zip -jr dist/server-agent_${GOOS}_${GOARCH}.zip dist/*/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-agent_${{ env.GOOS }}_${{ env.GOARCH }}
          path: |
            ./dist/server-agent_${{ env.GOOS }}_${{ env.GOARCH }}.zip

  build:
    strategy:
      fail-fast: true
      matrix:
        goos: [linux, darwin, freebsd]
        goarch: [amd64, arm64, 386]
        include:
          - goos: linux
            goarch: 386
          - goos: linux
            goarch: s390x
          - goos: linux
            goarch: riscv64
          - goos: linux
            goarch: arm
          - goos: linux
            goarch: mips
            gomips: softfloat
          - goos: linux
            goarch: mipsle
            gomips: softfloat
          - goos: freebsd
            goarch: arm
        exclude:
          - goos: darwin
            goarch: 386

    name: Build artifacts
    runs-on: ubuntu-latest
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOMIPS: ${{ matrix.gomips }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"

      - name: Build Test
        if: github.event_name != 'push' || !contains(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: build --single-target --clean --snapshot

      - name: Build
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: build --single-target --clean

      - name: Archive
        run: zip -jr dist/server-agent_${GOOS}_${GOARCH}.zip dist/*/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-agent_${{ env.GOOS }}_${{ env.GOARCH }}
          path: |
            ./dist/server-agent_${{ env.GOOS }}_${{ env.GOARCH }}.zip

  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    needs: [build, build-windows]
    name: Release
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./assets

      - name: Checksum
        run: sha256sum ./assets/*/*.zip | awk -F" |/" '{print $1, $NF}' > checksums.txt

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "checksums.txt,assets/*/*.zip"
          generateReleaseNotes: true

      - name: Trigger R2 release sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run sync-release.yml -f tag="${GITHUB_REF_NAME}" -R ${{ github.repository }}
